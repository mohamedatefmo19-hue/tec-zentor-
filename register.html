<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Zentor · إنشاء حساب معلم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background 0.2s, color 0.2s;
    }
    body.dark-mode { background: #0b0e14; color: #eef2f6; }

    .auth-card {
      background: #ffffff;
      max-width: 460px;
      width: 100%;
      padding: 2.5rem 2rem 2.2rem;
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
      transition: background 0.2s, box-shadow 0.2s;
    }
    body.dark-mode .auth-card { background: #1a1f2b; }

    .logo-area { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem; }
    .logo-icon {
      font-size: 2rem; color: #2a7de1; background: #e8f0fe;
      width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 16px;
    }
    body.dark-mode .logo-icon { background: #2a3a5a; color: #6b9ef0; }
    .logo-text { font-weight: 700; font-size: 1.6rem; letter-spacing: -0.5px; color: #0b1e33; }
    body.dark-mode .logo-text { color: #eef2f6; }
    .subhead { font-size: 0.9rem; color: #5e6f8d; margin-top: 0.2rem; font-weight: 500; }

    .form-group { margin-bottom: 1.3rem; position: relative; }
    .form-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.4rem; color: #1f2a41; }
    body.dark-mode .form-group label { color: #d0dae8; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #8a9bb5; font-size: 1rem; }
    .input-wrapper input {
      width: 100%; padding: 0.9rem 1rem 0.9rem 2.8rem; border: 1.5px solid #dfe6f0; border-radius: 14px;
      font-size: 1rem; background: #f9fbfe; transition: 0.15s; font-weight: 500; color: #1a253a;
    }
    body.dark-mode .input-wrapper input { background: #252d3d; border-color: #3b465b; color: #eef2f6; }
    .input-wrapper input:focus { outline: none; border-color: #2a7de1; box-shadow: 0 0 0 4px rgba(42,125,225,0.15); }

    .btn-submit {
      width: 100%; padding: 0.9rem; background: #2a7de1; border: none; border-radius: 40px;
      font-weight: 700; font-size: 1rem; color: white; display: flex; align-items: center; justify-content: center;
      gap: 0.7rem; cursor: pointer; transition: 0.15s; box-shadow: 0 8px 20px -6px rgba(42,125,225,0.3);
    }
    .btn-submit:hover { background: #1a67c4; }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

    .spinner {
      display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.25);
      border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .message-box {
      margin-top: 1.2rem; padding: 0.8rem 1rem; border-radius: 14px; font-weight: 500; font-size: 0.9rem;
      display: none; align-items: center; gap: 0.6rem;
    }
    .message-box.error { display: flex; background: #fde8e8; color: #b3403a; border-left: 5px solid #b3403a; }
    .message-box.success { display: flex; background: #e3f5e9; color: #1f7840; border-left: 5px solid #1f7840; }
    body.dark-mode .message-box.error { background: #3a2626; color: #f5b1b1; }
    body.dark-mode .message-box.success { background: #1e3a2a; color: #8bddb0; }

    .footer-lang {
      display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;
      font-size: 0.8rem; color: #6b7d9c; border-top: 1px solid #e7edf5; padding-top: 1.5rem;
    }
    body.dark-mode .footer-lang { border-top-color: #2f3b4f; color: #9aabbf; }
    .link-btn { background: none; border: none; font-weight: 600; color: #2a7de1; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
    .rtl .input-wrapper i { left: auto; right: 1rem; }
    .rtl .input-wrapper input { padding: 0.9rem 2.8rem 0.9rem 1rem; }
    @media (max-width: 480px) { .auth-card { padding: 1.8rem 1.2rem; } }
  </style>
</head>
<body>
  <div class="auth-card" id="authCard">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <div>
        <div class="logo-text">Zentor</div>
        <div class="subhead" id="subhead">إنشاء حساب معلم جديد</div>
      </div>
    </div>

    <form id="registerForm" autocomplete="off">
      <div class="form-group">
        <label for="nameInput">الاسم الكامل</label>
        <div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="nameInput" placeholder="محمد أحمد" required></div>
      </div>
      <div class="form-group">
        <label for="emailInput">البريد الإلكتروني</label>
        <div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="emailInput" placeholder="teacher@zentor.com" required></div>
      </div>
      <div class="form-group">
        <label for="passwordInput">كلمة المرور (6 أحرف على الأقل)</label>
        <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="passwordInput" placeholder="••••••••" required minlength="6"></div>
      </div>
      <div class="form-group">
        <label for="confirmInput">تأكيد كلمة المرور</label>
        <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="confirmInput" placeholder="••••••••" required minlength="6"></div>
      </div>

      <button type="submit" class="btn-submit" id="registerBtn">
        <span id="btnText">إنشاء حساب</span>
        <span id="btnSpinner" style="display: none;"><span class="spinner"></span></span>
      </button>
    </form>

    <div id="messageBox" class="message-box"><i id="msgIcon" class="fas fa-info-circle"></i><span id="msgText"></span></div>

    <div class="footer-lang">
      <a href="login.html" class="link-btn"><i class="fas fa-arrow-right"></i> لديك حساب؟ سجل دخول</a>
      <div style="display:flex; gap:1rem;">
        <button class="link-btn" id="langToggle"><i class="fas fa-globe"></i> <span id="langLabel">AR</span></button>
        <button class="link-btn" id="darkToggle" style="color:#6b7d9c;"><i class="fas fa-moon"></i> <span id="darkLabel">داكن</span></button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
      authDomain: "zentor-caaf1.firebaseapp.com",
      projectId: "zentor-caaf1",
      storageBucket: "zentor-caaf1.firebasestorage.app",
      messagingSenderId: "681267238383",
      appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
      measurementId: "G-X80GNJHMS5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const messageBox = document.getElementById('messageBox');
    const msgText = document.getElementById('msgText');
    const msgIcon = document.getElementById('msgIcon');

    function showMessage(text, type = 'error') {
      messageBox.className = `message-box ${type}`;
      msgText.textContent = text;
      msgIcon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
      messageBox.style.display = 'flex';
    }
    function hideMessage() { messageBox.style.display = 'none'; messageBox.className = 'message-box'; }
    function setLoading(isLoading) { registerBtn.disabled = isLoading; btnText.style.display = isLoading ? 'none' : 'inline'; btnSpinner.style.display = isLoading ? 'inline' : 'none'; }

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault(); hideMessage();

      const name = document.getElementById('nameInput').value.trim();
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const confirm = document.getElementById('confirmInput').value;

      if (!name || !email || !password || !confirm) { showMessage('يرجى ملء جميع الحقول', 'error'); return; }
      if (password !== confirm) { showMessage('كلمة المرور وتأكيدها غير متطابقين', 'error'); return; }
      if (password.length < 6) { showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error'); return; }

      setLoading(true);
      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCred.user;
        await updateProfile(user, { displayName: name });

        await setDoc(doc(db, 'teachers', user.uid, 'settings', 'preferences'), {
          name, email, phone: '',
          notifEmail: true, notifPush: true, notifSms: false,
          language: 'ar', darkMode: false,
          status: 'pending',
          createdAt: serverTimestamp()
        });

        await signOut(auth);
        showMessage('✅ تم إنشاء حسابك بنجاح! حسابك قيد المراجعة من قبل المشرف.', 'success');
        registerBtn.disabled = true;
        registerForm.querySelectorAll('input').forEach(inp => inp.disabled = true);
      } catch (error) {
        console.error(error);
        let msg = error.message || 'فشل إنشاء الحساب';
        if (error.code === 'auth/email-already-in-use') msg = 'البريد الإلكتروني مستخدم بالفعل.';
        else if (error.code === 'auth/weak-password') msg = 'كلمة المرور ضعيفة جدًا.';
        showMessage('❌ ' + msg, 'error');
      } finally { setLoading(false); }
    });

    // لغة ووضع ليلي
    let lang = 'ar', isDark = false;
    const langToggle = document.getElementById('langToggle'), darkToggle = document.getElementById('darkToggle');
    const langLabel = document.getElementById('langLabel'), darkLabel = document.getElementById('darkLabel');
    const subhead = document.getElementById('subhead'), authCard = document.getElementById('authCard');

    function applyLanguage(l) {
      lang = l;
      if (l === 'ar') {
        authCard.classList.add('rtl'); document.documentElement.lang = 'ar'; document.documentElement.dir = 'rtl';
        subhead.textContent = 'إنشاء حساب معلم جديد';
        document.getElementById('nameInput').placeholder = 'محمد أحمد';
        document.querySelector('label[for="nameInput"]').textContent = 'الاسم الكامل';
        document.querySelector('label[for="emailInput"]').textContent = 'البريد الإلكتروني';
        document.querySelector('label[for="passwordInput"]').textContent = 'كلمة المرور (6 أحرف على الأقل)';
        document.querySelector('label[for="confirmInput"]').textContent = 'تأكيد كلمة المرور';
        btnText.textContent = 'إنشاء حساب'; langLabel.textContent = 'AR';
      } else {
        authCard.classList.remove('rtl'); document.documentElement.lang = 'en'; document.documentElement.dir = 'ltr';
        subhead.textContent = 'Create New Teacher Account';
        document.getElementById('nameInput').placeholder = 'John Doe';
        document.querySelector('label[for="nameInput"]').textContent = 'Full Name';
        document.querySelector('label[for="emailInput"]').textContent = 'Email';
        document.querySelector('label[for="passwordInput"]').textContent = 'Password (min 6)';
        document.querySelector('label[for="confirmInput"]').textContent = 'Confirm Password';
        btnText.textContent = 'Create Account'; langLabel.textContent = 'EN';
      }
    }
    langToggle.addEventListener('click', () => applyLanguage(lang === 'ar' ? 'en' : 'ar'));
    darkToggle.addEventListener('click', () => {
      isDark = !isDark; document.body.classList.toggle('dark-mode', isDark);
      darkLabel.textContent = isDark ? 'فاتح' : 'داكن';
      darkToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i> ' : '<i class="fas fa-moon"></i> ';
      darkToggle.appendChild(document.createTextNode(darkLabel.textContent));
    });
    applyLanguage('ar');
  </script>
</body>
</html>

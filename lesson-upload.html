<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Zentor · رفع درس جديد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fc;
      color: #0b1e33;
      display: flex;
      min-height: 100vh;
    }
    body.dark-mode { background: #0b0e14; color: #eef2f6; }

    /* ---------- Sidebar ---------- */
    .sidebar {
      width: 260px; background: #ffffff; border-left: 1px solid #e7edf5;
      padding: 2rem 1.2rem; display: flex; flex-direction: column; position: fixed;
      top: 0; right: 0; bottom: 0; z-index: 1000; transition: transform 0.3s ease; transform: translateX(0);
    }
    body.dark-mode .sidebar { background: #141a26; border-left-color: #2a3442; }
    .sidebar.closed { transform: translateX(100%); }
    .sidebar-logo { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 2.5rem; }
    .sidebar-logo i { font-size: 1.8rem; color: #2a7de1; background: #e8f0fe; padding: 0.6rem; border-radius: 14px; }
    body.dark-mode .sidebar-logo i { background: #1f2a40; color: #6b9ef0; }
    .sidebar-logo span { font-weight: 700; font-size: 1.5rem; }
    .sidebar nav { flex: 1; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; border-radius: 12px;
      color: #4a5b7a; text-decoration: none; font-weight: 500; transition: 0.15s; margin-bottom: 0.3rem;
    }
    .sidebar nav a i { width: 1.4rem; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #eef4fe; color: #1a67c4; }
    body.dark-mode .sidebar nav a:hover, body.dark-mode .sidebar nav a.active { background: #1f2a40; color: #6b9ef0; }
    .sidebar-footer {
      border-top: 1px solid #e7edf5; padding-top: 1.2rem; margin-top: 0.5rem; font-size: 0.9rem;
      font-weight: 600; color: #6b7d9c; cursor: pointer; display: flex; align-items: center; gap: 0.6rem;
    }
    .sidebar-footer:hover { color: #e74c3c; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; }
    .sidebar-overlay.show { display: block; }

    /* ---------- Main ---------- */
    .main {
      flex: 1; margin-right: 260px; padding: 1.8rem 2rem 2.5rem; transition: margin-right 0.3s ease;
      overflow-x: hidden; width: 100%;
    }
    .main.expanded { margin-right: 0; }
    .navbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
    .navbar h1 { font-size: 1.7rem; font-weight: 700; }
    .navbar-actions { display: flex; align-items: center; gap: 1.2rem; }
    .navbar-actions button { background: none; border: none; font-size: 1.2rem; color: #4a5b7a; cursor: pointer; }
    body.dark-mode .navbar-actions button { color: #b0c0d4; }
    .navbar-actions button:hover { color: #2a7de1; }
    .lang-dark { display: flex; gap: 0.6rem; }
    .lang-dark button { background: none; border: none; font-weight: 600; color: #2a7de1; cursor: pointer; font-size: 0.85rem; }
    .lang-dark .dark-toggle { color: #6b7d9c; }
    body.dark-mode .lang-dark .dark-toggle { color: #b0c0d4; }
    .hamburger { display: none; background: none; border: none; font-size: 1.5rem; color: #4a5b7a; cursor: pointer; }
    body.dark-mode .hamburger { color: #b0c0d4; }

    /* ---------- Upload Card ---------- */
    .upload-card {
      background: #ffffff; border-radius: 24px; padding: 2rem; border: 1px solid #eef2f8; max-width: 800px; margin: 0 auto;
    }
    body.dark-mode .upload-card { background: #1a1f2b; border-color: #2a3442; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.4rem; }
    .form-group label .required { color: #e74c3c; margin-right: 0.2rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #dfe6f0; border-radius: 14px;
      font-size: 0.95rem; background: #f9fbfe; transition: 0.15s; color: #1a253a;
    }
    body.dark-mode .form-group input, body.dark-mode .form-group textarea, body.dark-mode .form-group select {
      background: #252d3d; border-color: #3b465b; color: #eef2f6;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: #2a7de1; box-shadow: 0 0 0 4px rgba(42,125,225,0.1);
    }

    .upload-area {
      border: 2px dashed #dfe6f0; border-radius: 14px; padding: 1.5rem; text-align: center;
      cursor: pointer; transition: 0.15s; background: #f9fbfe;
    }
    body.dark-mode .upload-area { background: #252d3d; border-color: #3b465b; }
    .upload-area:hover { border-color: #2a7de1; background: #eef4fe; }
    .upload-area i { font-size: 2rem; color: #2a7de1; opacity: 0.6; margin-bottom: 0.5rem; }
    .upload-area .file-info { font-size: 0.85rem; color: #6b7d9c; }
    .upload-preview { margin-top: 0.8rem; display: none; }
    .upload-preview img, .upload-preview video { max-width: 100%; max-height: 200px; border-radius: 12px; border: 1px solid #dfe6f0; }
    .upload-preview .file-link { display: inline-block; margin-top: 0.5rem; font-size: 0.9rem; font-weight: 500; color: #2a7de1; word-break: break-all; }

    .checkbox-group { display: flex; align-items: center; gap: 0.7rem; padding: 0.5rem 0; }
    .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; accent-color: #2a7de1; cursor: pointer; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.8rem 2rem; border-radius: 40px;
      font-weight: 600; border: none; cursor: pointer; transition: 0.15s; font-size: 0.9rem; text-decoration: none;
    }
    .btn-primary { background: #2a7de1; color: white; }
    .btn-primary:hover { background: #1a67c4; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #eef2f8; color: #1a253a; }
    .btn-secondary:hover { background: #dfe6f0; }
    body.dark-mode .btn-secondary { background: #2a3442; color: #eef2f6; }

    .form-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .action-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }

    /* ---------- Toast ---------- */
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 3000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast {
      padding: 0.8rem 1.5rem; border-radius: 14px; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; animation: slideIn 0.3s ease;
    }
    body.dark-mode .toast { background: #2a3442; color: #eef2f6; }
    .toast.success { border-right: 4px solid #10B981; }
    .toast.error { border-right: 4px solid #EF4444; }
    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .hamburger { display: block; }
      .main { margin-right: 0; }
      .sidebar { transform: translateX(100%); }
      .sidebar.closed { transform: translateX(100%); }
      .sidebar.open { transform: translateX(0); }
      .upload-card { padding: 1.2rem; }
    }
    @media (max-width: 480px) { .form-actions { flex-direction: column; } .action-bar { flex-direction: column; } }
    .rtl { direction: rtl; }
    .rtl .sidebar nav a { flex-direction: row-reverse; }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><i class="fas fa-graduation-cap"></i><span>Zentor</span></div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-chart-pie"></i> <span data-key="dashboard">لوحة التحكم</span></a>
      <a href="courses.html"><i class="fas fa-book-open"></i> <span data-key="courses">الكورسات</span></a>
      <a href="lessons.html"><i class="fas fa-file-alt"></i> <span data-key="lessons">الدروس</span></a>
      <a href="lesson-upload.html" class="active"><i class="fas fa-upload"></i> <span data-key="upload">رفع درس</span></a>
      <a href="live-classes.html"><i class="fas fa-video"></i> <span data-key="live">البث المباشر</span></a>
      <a href="students.html"><i class="fas fa-users"></i> <span data-key="students">الطلاب</span></a>
      <a href="assignments.html"><i class="fas fa-clipboard-list"></i> <span data-key="assignments">الواجبات</span></a>
      <a href="exams.html"><i class="fas fa-file-alt"></i> <span data-key="exams">الامتحانات</span></a>
      <a href="revenue.html"><i class="fas fa-dollar-sign"></i> <span data-key="revenue">الإيرادات</span></a>
      <a href="messages.html"><i class="fas fa-comments"></i> <span data-key="messages">الرسائل</span></a>
      <a href="settings.html"><i class="fas fa-cog"></i> <span data-key="settings">الإعدادات</span></a>
    </nav>
    <div class="sidebar-footer" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span data-key="logout">تسجيل الخروج</span></div>
  </aside>

  <div class="main" id="mainContent">
    <header class="navbar">
      <div style="display:flex; align-items:center; gap:1rem;">
        <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <h1>📤 رفع درس جديد</h1>
      </div>
      <div class="navbar-actions">
        <div class="lang-dark">
          <button id="langToggle"><i class="fas fa-globe"></i> <span id="langLabel">AR</span></button>
          <button class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
        </div>
        <button><i class="fas fa-user-circle" style="font-size:1.6rem;"></i></button>
      </div>
    </header>

    <div class="action-bar">
      <a href="#" id="backToLessonsBtn" class="btn-secondary"><i class="fas fa-arrow-left"></i> العودة للدروس</a>
    </div>

    <div class="upload-card">
      <form id="uploadForm">
        <!-- العنوان -->
        <div class="form-group">
          <label>عنوان الدرس <span class="required">*</span></label>
          <input type="text" id="formTitle" required placeholder="أدخل عنوان الدرس">
        </div>

        <!-- الوصف -->
        <div class="form-group">
          <label>الوصف</label>
          <textarea id="formDesc" rows="3" placeholder="وصف مختصر للدرس"></textarea>
        </div>

        <!-- اختيار الكورس -->
        <div class="form-group">
          <label>اختر الكورس <span class="required">*</span></label>
          <select id="formCourse" required>
            <option value="">-- اختر كورس --</option>
          </select>
        </div>

        <!-- رفع فيديو -->
        <div class="form-group">
          <label>الفيديو <span class="required">*</span></label>
          <div class="upload-area" id="videoUploadBtn">
            <i class="fas fa-video"></i>
            <div class="file-info">انقر لرفع فيديو (MP4, MOV)</div>
            <div class="upload-preview" id="videoPreview">
              <video controls src="" id="videoPreviewEl"></video>
            </div>
          </div>
        </div>

        <!-- رفع PDF (اختياري) -->
        <div class="form-group">
          <label>ملف PDF (اختياري)</label>
          <div class="upload-area" id="pdfUploadBtn">
            <i class="fas fa-file-pdf"></i>
            <div class="file-info">انقر لرفع PDF</div>
            <div class="upload-preview" id="pdfPreview">
              <a href="#" target="_blank" class="file-link" id="pdfLink"></a>
            </div>
          </div>
        </div>

        <!-- رفع صورة مصغرة (اختياري) -->
        <div class="form-group">
          <label>الصورة المصغرة (اختياري)</label>
          <div class="upload-area" id="thumbUploadBtn">
            <i class="fas fa-image"></i>
            <div class="file-info">انقر لرفع صورة (JPG, PNG)</div>
            <div class="upload-preview" id="thumbPreview">
              <img src="" alt="معاينة" id="thumbPreviewImg">
            </div>
          </div>
        </div>

        <!-- جدولة النشر -->
        <div class="form-group">
          <label>جدولة النشر</label>
          <input type="datetime-local" id="formSchedule">
        </div>

        <!-- نوع الدرس -->
        <div class="form-group">
          <label>نوع الدرس</label>
          <div class="checkbox-group">
            <input type="checkbox" id="formFree" checked>
            <label for="formFree" style="margin:0;font-weight:500;">درس مجاني</label>
          </div>
          <div style="margin-top:0.5rem;display:none;" id="priceContainer">
            <input type="number" id="formPrice" placeholder="السعر ($)" step="0.01" min="0">
          </div>
        </div>

        <!-- أزرار -->
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="resetBtn">إعادة تعيين</button>
          <button type="submit" class="btn-primary" id="submitBtn">
            <i class="fas fa-cloud-upload-alt"></i> رفع الدرس
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
      authDomain: "zentor-caaf1.firebaseapp.com",
      projectId: "zentor-caaf1",
      storageBucket: "zentor-caaf1.firebasestorage.app",
      messagingSenderId: "681267238383",
      appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
      measurementId: "G-X80GNJHMS5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let TEACHER_ID = '';
    const urlParams = new URLSearchParams(window.location.search);
    const courseIdParam = urlParams.get('courseId');

    // ---------- حماية ----------
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      TEACHER_ID = user.uid;
      document.body.classList.add('auth-ready');
      loadCourses();
    });

    // ---------- Sidebar Mobile ----------
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    document.getElementById('hamburgerBtn').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('show'); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
    document.querySelectorAll('.sidebar nav a').forEach(link => {
      link.addEventListener('click', () => { if (window.innerWidth <= 768) { sidebar.classList.remove('open'); overlay.classList.remove('show'); } });
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      if (confirm('هل تريد تسجيل الخروج؟')) signOut(auth).then(() => window.location.href = 'login.html');
    });

    // ---------- Toast ----------
    function showToast(msg, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div'); toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
      container.appendChild(toast); setTimeout(() => toast.remove(), 3000);
    }

    // ---------- Cloudinary ----------
    const cloudName = "deaevfmvm", uploadPreset = "ml_default";
    let uploadedVideoUrl = null, uploadedPdfUrl = null, uploadedThumbUrl = null;

    function openCloudinaryUpload(resourceType, folder, onSuccess) {
      if (!window.cloudinary) { showToast('Cloudinary غير محمل', 'error'); return; }
      const widget = window.cloudinary.createUploadWidget({
        cloudName, uploadPreset,
        sources: ['local', 'url', 'camera'], multiple: false,
        resourceType: resourceType === 'video' ? 'video' : 'image',
        clientAllowedFormats: resourceType === 'video' ? ['mp4', 'mov'] : (resourceType === 'image' ? ['png', 'jpg', 'jpeg', 'gif'] : ['pdf']),
        maxFileSize: resourceType === 'video' ? 200000000 : 10000000
      }, (error, result) => {
        if (!error && result && result.event === "success") onSuccess(result.info.secure_url);
        if (error) showToast('فشل الرفع', 'error');
      });
      widget.open();
    }

    // ربط أزرار الرفع
    document.getElementById('videoUploadBtn').addEventListener('click', () => {
      openCloudinaryUpload('video', 'videos', (url) => {
        uploadedVideoUrl = url;
        document.getElementById('videoPreviewEl').src = url;
        document.getElementById('videoPreview').style.display = 'block';
        showToast('تم رفع الفيديو!', 'success');
      });
    });
    document.getElementById('pdfUploadBtn').addEventListener('click', () => {
      openCloudinaryUpload('image', 'documents', (url) => {
        uploadedPdfUrl = url;
        document.getElementById('pdfLink').href = url;
        document.getElementById('pdfLink').textContent = 'عرض PDF';
        document.getElementById('pdfPreview').style.display = 'block';
        showToast('تم رفع PDF!', 'success');
      });
    });
    document.getElementById('thumbUploadBtn').addEventListener('click', () => {
      openCloudinaryUpload('image', 'lesson-thumbnails', (url) => {
        uploadedThumbUrl = url;
        document.getElementById('thumbPreviewImg').src = url;
        document.getElementById('thumbPreview').style.display = 'block';
        showToast('تم رفع الصورة!', 'success');
      });
    });

    // ---------- Load Courses ----------
    const formCourse = document.getElementById('formCourse');
    const backToLessonsBtn = document.getElementById('backToLessonsBtn');

    async function loadCourses() {
      try {
        const snap = await getDocs(collection(db, 'teachers', TEACHER_ID, 'courses'));
        formCourse.innerHTML = '<option value="">-- اختر كورس --</option>';
        snap.forEach(doc => {
          const c = doc.data();
          formCourse.innerHTML += `<option value="${doc.id}">${c.title || 'بدون عنوان'}</option>`;
        });
        if (courseIdParam) formCourse.value = courseIdParam;
        backToLessonsBtn.href = courseIdParam ? `lessons.html?courseId=${courseIdParam}` : 'lessons.html';
      } catch (e) { showToast('فشل تحميل الكورسات', 'error'); }
    }

    // ---------- Form Submit ----------
    const form = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const formFree = document.getElementById('formFree');
    const priceContainer = document.getElementById('priceContainer');
    const resetBtn = document.getElementById('resetBtn');

    formFree.addEventListener('change', () => { priceContainer.style.display = formFree.checked ? 'none' : 'block'; });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('formTitle').value.trim();
      const selectedCourseId = formCourse.value;

      if (!title) { showToast('العنوان مطلوب', 'error'); return; }
      if (!selectedCourseId) { showToast('اختر كورسًا', 'error'); return; }
      if (!uploadedVideoUrl) { showToast('ارفع فيديو', 'error'); return; }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';

      try {
        const lessonData = {
          title,
          description: document.getElementById('formDesc').value.trim(),
          courseId: selectedCourseId,
          videoUrl: uploadedVideoUrl,
          pdfUrl: uploadedPdfUrl || null,
          thumbnail: uploadedThumbUrl || null,
          isFree: formFree.checked,
          price: formFree.checked ? 0 : parseFloat(document.getElementById('formPrice').value) || 0,
          status: 'published',
          createdAt: Timestamp.now(),
          updatedAt: Timestamp.now()
        };

        if (document.getElementById('formSchedule').value) {
          lessonData.scheduledPublish = Timestamp.fromDate(new Date(document.getElementById('formSchedule').value));
        }

        await addDoc(collection(db, 'teachers', TEACHER_ID, 'lessons'), lessonData);
        showToast('✅ تم رفع الدرس بنجاح!', 'success');

        setTimeout(() => { window.location.href = backToLessonsBtn.href; }, 1500);
      } catch (error) { showToast('فشل الرفع: ' + error.message, 'error'); }
      finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> رفع الدرس';
      }
    });

    resetBtn.addEventListener('click', () => {
      if (confirm('إعادة تعيين جميع الحقول؟')) {
        form.reset();
        uploadedVideoUrl = null; uploadedPdfUrl = null; uploadedThumbUrl = null;
        document.getElementById('videoPreview').style.display = 'none';
        document.getElementById('pdfPreview').style.display = 'none';
        document.getElementById('thumbPreview').style.display = 'none';
        priceContainer.style.display = 'none'; formFree.checked = true;
        showToast('تمت إعادة التعيين', 'success');
      }
    });

    // ---------- لغة ووضع ليلي ----------
    let lang = 'ar';
    const langToggle = document.getElementById('langToggle'), darkToggle = document.getElementById('darkToggle'), langLabel = document.getElementById('langLabel');
    const mainEl = document.getElementById('mainContent');
    const translations = {
      ar: { dashboard:'لوحة التحكم', courses:'الكورسات', lessons:'الدروس', upload:'رفع درس', live:'البث المباشر', students:'الطلاب', assignments:'الواجبات', exams:'الامتحانات', revenue:'الإيرادات', messages:'الرسائل', settings:'الإعدادات', logout:'تسجيل الخروج' },
      en: { dashboard:'Dashboard', courses:'Courses', lessons:'Lessons', upload:'Upload Lesson', live:'Live Classes', students:'Students', assignments:'Assignments', exams:'Exams', revenue:'Revenue', messages:'Messages', settings:'Settings', logout:'Logout' }
    };
    function applyLanguage(lc) {
      const t = translations[lc];
      document.querySelectorAll('[data-key]').forEach(el => { if(t[el.dataset.key]) el.textContent = t[el.dataset.key]; });
      document.querySelector('.navbar h1').textContent = lc==='ar' ? '📤 رفع درس جديد' : '📤 Upload New Lesson';
      backToLessonsBtn.innerHTML = lc==='ar' ? '<i class="fas fa-arrow-left"></i> العودة للدروس' : '<i class="fas fa-arrow-left"></i> Back to Lessons';
      if (lc === 'ar') { mainEl.style.marginRight = '260px'; mainEl.style.marginLeft = '0'; document.documentElement.dir = 'rtl'; }
      else { mainEl.style.marginRight = '0'; mainEl.style.marginLeft = '260px'; document.documentElement.dir = 'ltr'; }
    }
    langToggle.addEventListener('click', () => { lang = lang==='ar'?'en':'ar'; langLabel.textContent = lang.toUpperCase(); applyLanguage(lang); });
    darkToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      darkToggle.innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });
    applyLanguage('ar');
    console.log('✅ Zentor Lesson Upload ready.');
  </script>
</body>
</html>

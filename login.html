<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Zentor · تسجيل دخول المعلم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #f4f7fc 50%, #eef2f8 100%);
            color: #0b1e33;
            display: flex;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0b0e14 0%, #141a26 50%, #1a1f2b 100%);
            color: #eef2f6;
        }

        /* شريط جانبي */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(231, 237, 245, 0.6);
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.05);
        }

        body.dark-mode .sidebar {
            background: rgba(20, 26, 38, 0.9);
            border-left-color: rgba(42, 52, 66, 0.6);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.2);
        }

        .sidebar.closed {
            transform: translateX(100%);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 2.5rem;
        }

        .sidebar-logo i {
            font-size: 1.8rem;
            color: #ffffff;
            background: linear-gradient(135deg, #2a7de1, #1a67c4);
            padding: 0.6rem;
            border-radius: 14px;
            box-shadow: 0 4px 12px rgba(42, 125, 225, 0.3);
        }

        .sidebar-logo span {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #2a7de1, #1a67c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar nav {
            flex: 1;
            overflow-y: auto;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 12px;
            color: #4a5b7a;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        .sidebar nav a i {
            width: 1.3rem;
            font-size: 1rem;
        }

        .sidebar nav a:hover {
            background: rgba(42, 125, 225, 0.08);
            color: #2a7de1;
            transform: translateX(-4px);
        }

        .sidebar nav a.active {
            background: linear-gradient(135deg, rgba(42, 125, 225, 0.12), rgba(26, 103, 196, 0.08));
            color: #2a7de1;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(42, 125, 225, 0.1);
        }

        body.dark-mode .sidebar nav a {
            color: #b0c0d4;
        }

        body.dark-mode .sidebar nav a:hover {
            background: rgba(107, 158, 240, 0.1);
            color: #6b9ef0;
        }

        body.dark-mode .sidebar nav a.active {
            background: rgba(107, 158, 240, 0.15);
            color: #6b9ef0;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(231, 237, 245, 0.6);
            padding-top: 1.2rem;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #6b7d9c;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        body.dark-mode .sidebar-footer {
            border-top-color: rgba(42, 52, 66, 0.6);
        }

        /* المحتوى الرئيسي */
        .main {
            flex: 1;
            margin-right: 260px;
            padding: 1.8rem 2rem 2.5rem;
            transition: margin-right 0.3s ease;
            overflow-x: hidden;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main.expanded {
            margin-right: 0;
        }

        /* بطاقة تسجيل الدخول */
        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(231, 237, 245, 0.6);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.3s ease;
        }

        body.dark-mode .login-card {
            background: rgba(26, 31, 43, 0.85);
            border-color: rgba(42, 52, 66, 0.6);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .login-card:hover {
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.15) inset;
        }

        body.dark-mode .login-card:hover {
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header i {
            font-size: 3rem;
            color: #ffffff;
            background: linear-gradient(135deg, #2a7de1, #1a67c4);
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            box-shadow: 0 8px 24px rgba(42, 125, 225, 0.3);
        }

        .login-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .login-header p {
            color: #6b7d9c;
            font-size: 0.9rem;
        }

        body.dark-mode .login-header p {
            color: #8a9bb5;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            color: #4a5b7a;
        }

        body.dark-mode .form-group label {
            color: #b0c0d4;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #8a9bb5;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            border: 1.5px solid rgba(223, 230, 240, 0.8);
            border-radius: 14px;
            font-size: 0.95rem;
            background: rgba(249, 251, 254, 0.7);
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        body.dark-mode .input-wrapper input {
            background: rgba(37, 45, 61, 0.7);
            border-color: rgba(59, 70, 91, 0.8);
            color: #eef2f6;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #2a7de1;
            box-shadow: 0 0 0 4px rgba(42, 125, 225, 0.1);
            background: rgba(255, 255, 255, 0.9);
        }

        body.dark-mode .input-wrapper input:focus {
            border-color: #6b9ef0;
            box-shadow: 0 0 0 4px rgba(107, 158, 240, 0.15);
            background: rgba(37, 45, 61, 0.9);
        }

        .input-wrapper input:focus+i {
            color: #2a7de1;
        }

        body.dark-mode .input-wrapper input:focus+i {
            color: #6b9ef0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            white-space: nowrap;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2a7de1, #1a67c4);
            color: white;
            box-shadow: 0 6px 20px rgba(42, 125, 225, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #1a67c4, #1557b0);
            box-shadow: 0 8px 25px rgba(42, 125, 225, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* أزرار الوضع الليلي واللغة */
        .toggle-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .toggle-btn {
            background: rgba(238, 242, 248, 0.8);
            border: 1px solid rgba(223, 230, 240, 0.5);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #4a5b7a;
            font-family: 'Inter', sans-serif;
        }

        body.dark-mode .toggle-btn {
            background: rgba(42, 52, 66, 0.8);
            border-color: rgba(59, 70, 91, 0.5);
            color: #b0c0d4;
        }

        .toggle-btn:hover {
            background: rgba(42, 125, 225, 0.1);
            border-color: #2a7de1;
            color: #2a7de1;
        }

        body.dark-mode .toggle-btn:hover {
            background: rgba(107, 158, 240, 0.1);
            border-color: #6b9ef0;
            color: #6b9ef0;
        }

        /* التحميل */
        .spinner {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* التوست */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.8rem 1.5rem;
            border-radius: 14px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        body.dark-mode .toast {
            background: #2a3442;
            color: #eef2f6;
        }

        .toast.success {
            border-right: 4px solid #10B981;
        }

        .toast.error {
            border-right: 4px solid #EF4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* هامبرغر للموبايل */
        .hamburger {
            display: none;
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(231, 237, 245, 0.6);
            border-radius: 12px;
            padding: 0.6rem;
            font-size: 1.3rem;
            color: #4a5b7a;
            cursor: pointer;
        }

        body.dark-mode .hamburger {
            background: rgba(26, 31, 43, 0.8);
            border-color: rgba(42, 52, 66, 0.6);
            color: #b0c0d4;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        .sidebar-overlay.show {
            display: block;
        }

        /* الروابط في الشريط الجانبي - قائمة منسدلة */
        .sidebar-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a9bb5;
            margin: 1rem 0 0.5rem 0;
            padding: 0 0.5rem;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }
            .main {
                margin-right: 0;
                padding: 1rem;
            }
            .sidebar {
                transform: translateX(100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .login-card {
                padding: 1.5rem 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                margin: 0 0.5rem;
            }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
            authDomain: "zentor-caaf1.firebaseapp.com",
            projectId: "zentor-caaf1",
            storageBucket: "zentor-caaf1.firebasestorage.app",
            messagingSenderId: "681267238383",
            appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
            measurementId: "G-X80GNJHMS5"
        };

        // إعدادات Cloudinary
        const CLOUDINARY_CLOUD_NAME = 'deaevfmvm';
        const CLOUDINARY_UPLOAD_PRESET = 'ml_default';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // عناصر DOM
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const toastContainer = document.getElementById('toastContainer');

        // المتغيرات العامة
        let currentLang = 'ar';

        // ---------- دوال المساعدة ----------
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function setLoading(loading) {
            const btnText = loginBtn.querySelector('span');
            if (loading) {
                loginBtn.disabled = true;
                btnText.innerHTML = `<span class="spinner"></span> ${translations[currentLang].loading}`;
            } else {
                loginBtn.disabled = false;
                btnText.textContent = translations[currentLang].signIn;
            }
        }

        // استخراج الاسم من البريد الإلكتروني
        function getNameFromEmail(email) {
            if (!email) return 'معلم';
            const localPart = email.split('@')[0];
            // تنظيف الجزء المحلي من الرموز الخاصة
            const cleaned = localPart.replace(/[._-]/g, ' ').replace(/\d+/g, '').trim();
            if (cleaned.length === 0) return 'معلم';
            // جعل أول حرف كبيراً
            return cleaned.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        // التحقق من حالة المعلم بعد تسجيل الدخول
        async function checkTeacherProfile(user) {
            const teacherId = user.uid;
            const profileRef = doc(db, 'teachers', teacherId, 'settings', 'profile');
            const preferencesRef = doc(db, 'teachers', teacherId, 'settings', 'preferences');

            try {
                // التحقق من وجود الملف الشخصي
                const profileSnap = await getDoc(profileRef);

                if (!profileSnap.exists()) {
                    // إنشاء الملف الشخصي تلقائياً
                    const teacherName = getNameFromEmail(user.email);
                    await setDoc(profileRef, {
                        name: teacherName,
                        email: user.email,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp(),
                        photoURL: null,
                        bio: '',
                        specialties: []
                    });
                }

                // التحقق من وجود التفضيلات
                const prefSnap = await getDoc(preferencesRef);

                if (!prefSnap.exists()) {
                    // إنشاء تفضيلات افتراضية
                    await setDoc(preferencesRef, {
                        status: 'pending', // حالة "قيد المراجعة" الافتراضية
                        language: 'ar',
                        darkMode: false,
                        notifications: {
                            email: true,
                            push: true,
                            students: true,
                            courses: true
                        },
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    });
                    // المعلم غير مفعل بعد - نسجل الخروج ونظهر رسالة
                    await signOut(auth);
                    showToast(translations[currentLang].accountUnderReview, 'error');
                    return false;
                }

                // التحقق من حالة التفعيل
                const status = prefSnap.data().status;
                if (status === 'pending') {
                    // المعلم قيد المراجعة
                    await signOut(auth);
                    showToast(translations[currentLang].accountUnderReview, 'error');
                    return false;
                }

                if (status === 'blocked' || status === 'suspended') {
                    await signOut(auth);
                    showToast(translations[currentLang].accountBlocked, 'error');
                    return false;
                }

                // المعلم مفعل - توجيه إلى لوحة التحكم
                return true;

            } catch (error) {
                console.error('خطأ في التحقق من ملف المعلم:', error);
                showToast(translations[currentLang].errorChecking + ': ' + error.message, 'error');
                await signOut(auth);
                return false;
            }
        }

        // ---------- معالج تسجيل الدخول ----------
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showToast(translations[currentLang].fillAllFields, 'error');
                return;
            }

            setLoading(true);

            try {
                // تسجيل الدخول عبر Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // التحقق من حالة المعلم
                const isActive = await checkTeacherProfile(user);

                if (isActive) {
                    showToast(translations[currentLang].loginSuccess, 'success');
                    // توجيه إلى لوحة التحكم بعد تأخير قصير
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
            } catch (error) {
                console.error('خطأ في تسجيل الدخول:', error);
                let errorMessage = translations[currentLang].loginFailed;

                // ترجمة أخطاء Firebase الشائعة
                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMessage = translations[currentLang].invalidEmail;
                        break;
                    case 'auth/user-not-found':
                        errorMessage = translations[currentLang].userNotFound;
                        break;
                    case 'auth/wrong-password':
                        errorMessage = translations[currentLang].wrongPassword;
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = translations[currentLang].tooManyRequests;
                        break;
                    case 'auth/invalid-credential':
                        errorMessage = translations[currentLang].invalidCredentials;
                        break;
                }

                showToast(errorMessage, 'error');
            } finally {
                setLoading(false);
            }
        });

        // ---------- التحقق من حالة المستخدم عند تحميل الصفحة ----------
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // المستخدم مسجل دخوله بالفعل - التحقق من حالة المعلم
                const isActive = await checkTeacherProfile(user);
                if (isActive) {
                    // توجيه مباشر إلى لوحة التحكم
                    window.location.href = 'dashboard.html';
                }
            }
        });

        // ---------- الشريط الجانبي ----------
        hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('show');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });

        // إغلاق الشريط الجانبي عند النقر على رابط (للموبايل)
        document.querySelectorAll('.sidebar nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                // منع التوجيه الافتراضي لأنها صفحة تسجيل دخول
                e.preventDefault();
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('show');
                }
                showToast(translations[currentLang].loginFirst, 'error');
            });
        });

        // ---------- الترجمة واللغة ----------
        const translations = {
            ar: {
                teacherLogin: 'تسجيل دخول المعلم',

                subscription: 'أكواد الاشتراك',
                analytics: 'التحليلات',
                calendar: 'التقويم',
                profile: 'الملف الشخصي',
                settings: 'الإعدادات',
                secureLogin: 'تسجيل دخول آمن',
                loginSuccess: 'تم تسجيل الدخول بنجاح! جاري التوجيه...',

                fillAllFields: 'يرجى ملء جميع الحقول',

            en: {

                email: 'Email Address',

                dashboard: 'Dashboard',

                loginFirst: 'You must login first to access this page'
            }
        };

        function applyLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];

            // تحديث جميع العناصر التي تحمل data-key
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (t[key]) {
                    el.textContent = t[key];
                }
            });

            // تحديث اتجاه الصفحة
            if (lang === 'ar') {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
                sidebar.style.right = '0';
                sidebar.style.left = 'auto';
                document.getElementById('mainContent').style.marginRight = '260px';
                document.getElementById('mainContent').style.marginLeft = '0';
                document.getElementById('langLabel').textContent = 'English';
            } else {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
                sidebar.style.left = '0';
                sidebar.style.right = 'auto';
                document.getElementById('mainContent').style.marginLeft = '260px';
                document.getElementById('mainContent').style.marginRight = '0';
                document.getElementById('langLabel').textContent = 'العربية';
            }

            // تحديث placeholder
            emailInput.placeholder = lang === 'ar' ? 'example@email.com' : 'example@email.com';
            passwordInput.placeholder = lang === 'ar' ? '••••••••' : '••••••••';
        }

        // زر تبديل اللغة
        document.getElementById('langToggle').addEventListener('click', () => {
            const newLang = currentLang === 'ar' ? 'en' : 'ar';
            applyLanguage(newLang);
        });

        // ---------- الوضع الليلي ----------
        const darkToggle = document.getElementById('darkToggle');

        function applyDarkMode(isDark) {
            if (isDark) {
                document.body.classList.add('dark-mode');
                darkToggle.querySelector('i').className = 'fas fa-sun';
            } else {
                document.body.classList.remove('dark-mode');
                darkToggle.querySelector('i').className = 'fas fa-moon';
            }
        }

        // استعادة تفضيلات الوضع الليلي من التخزين المحلي
        const savedDarkMode = localStorage.getItem('zentor_dark_mode');
        if (savedDarkMode === 'true') {
            applyDarkMode(true);
        }

        darkToggle.addEventListener('click', () => {
            const isDark = !document.body.classList.contains('dark-mode');
            applyDarkMode(isDark);
            localStorage.setItem('zentor_dark_mode', isDark ? 'true' : 'false');
        });

        // ---------- دالة تحميل Cloudinary (للاستخدام المستقبلي) ----------
        window.uploadToCloudinary = async function(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

            try {
                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`,
                    { method: 'POST', body: formData }
                );
                const data = await response.json();
                return data.secure_url;
            } catch (error) {
                console.error('Cloudinary upload failed:', error);
                throw error;
            }
        };

        // ---------- التهيئة الأولية ----------
        applyLanguage('ar');

        // تعديل CSS للتوافق مع اللغة الإنجليزية عند التبديل
        const style = document.createElement('style');
        style.id = 'dynamic-styles';
        document.head.appendChild(style);

        function updateDynamicStyles() {
            const dynamicStyle = document.getElementById('dynamic-styles');
            if (currentLang === 'en') {
                dynamicStyle.textContent = `
                    .sidebar { border-right: 1px solid rgba(231, 237, 245, 0.6); border-left: none; }
                    body.dark-mode .sidebar { border-right-color: rgba(42, 52, 66, 0.6); }
                    .toast.success { border-left: 4px solid #10B981; border-right: none; }
                    .toast.error { border-left: 4px solid #EF4444; border-right: none; }
                    @media (max-width: 768px) {
                        .sidebar { transform: translateX(-100%); }
                        .sidebar.open { transform: translateX(0); }
                    }
                `;
            } else {
                dynamicStyle.textContent = `
                    .sidebar { border-left: 1px solid rgba(231, 237, 245, 0.6); border-right: none; }
                    body.dark-mode .sidebar { border-left-color: rgba(42, 52, 66, 0.6); }
                    .toast.success { border-right: 4px solid #10B981; border-left: none; }
                    .toast.error { border-right: 4px solid #EF4444; border-left: none; }
                    @media (max-width: 768px) {
                        .sidebar { transform: translateX(100%); }
                        .sidebar.open { transform: translateX(0); }
                    }
                `;
            }
        }

        // مراقب لتحديث الأنماط عند تغيير اللغة
        const originalApplyLanguage = applyLanguage;
        applyLanguage = function(lang) {
            originalApplyLanguage(lang);
            updateDynamicStyles();
        };

        updateDynamicStyles();

        console.log('✅ Zentor Teacher Login ready.');
        console.log('📦 Firebase config:', firebaseConfig.projectId);
        console.log('☁️ Cloudinary:', CLOUDINARY_CLOUD_NAME);
    </script>

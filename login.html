<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Zentor | تسجيل دخول المعلم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #2a7de1;
      --primary-hover: #1a67c4;
      --primary-light: #e8f1fc;
      --background: #f4f7fc;
      --card: #ffffff;
      --text: #0b1e33;
      --text-secondary: #5a6d80;
      --border: #e2e8f0;
      --shadow: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
      --glass-bg: rgba(255,255,255,0.7);
      --glass-border: rgba(255,255,255,0.5);
      --glass-blur: blur(12px);
      --radius: 16px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dark {
      --background: #0b0e14;
      --card: #1a1f2b;
      --text: #eef2f6;
      --text-secondary: #9aa4b2;
      --border: #2a3140;
      --shadow: 0 4px 6px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.4);
      --glass-bg: rgba(26,31,43,0.7);
      --glass-border: rgba(255,255,255,0.08);
      --primary-light: #1a2b44;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background var(--transition), color var(--transition);
      position: relative;
      overflow-x: hidden;
    }
    .bg-decoration {
      position: fixed;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(42,125,225,0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none; z-index: 0;
    }
    .bg-decoration-2 {
      top: auto; bottom: -100px; right: auto; left: -100px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(42,125,225,0.07) 0%, transparent 70%);
    }
    .login-container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
    .login-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow-lg);
      transition: all var(--transition);
    }
    .dark .login-card { background: var(--card); }
    .login-header { text-align: center; margin-bottom: 2rem; }
    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
      color: var(--primary);
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .logo-link i { font-size: 1.6rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-weight: 500; margin-bottom: 0.4rem; color: var(--text); font-size: 0.9rem; }
    .input-wrapper { position: relative; }
    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all var(--transition);
      outline: none;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(42,125,225,0.1); }
    .input-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }
    [dir="rtl"] .input-icon { right: 1rem; }
    [dir="ltr"] .input-icon { left: 1rem; }
    [dir="rtl"] input { padding-right: 2.8rem; }
    [dir="ltr"] input { padding-left: 2.8rem; }
    .btn {
      width: 100%;
      padding: 0.95rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(42,125,225,0.3);
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(42,125,225,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: inline-block; }
    .top-controls { position: fixed; top: 1rem; right: 1rem; display: flex; gap: 0.5rem; z-index: 10; }
    [dir="ltr"] .top-controls { right: auto; left: 1rem; }
    .ctrl-btn {
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);
      color: var(--text); width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all var(--transition); font-size: 1rem;
    }
    .ctrl-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .back-link {
      position: fixed; top: 1rem; left: 1rem;
      color: var(--text-secondary); text-decoration: none;
      font-size: 0.9rem; display: flex; align-items: center; gap: 0.4rem;
      z-index: 10; transition: color var(--transition);
    }
    [dir="ltr"] .back-link { left: auto; right: 1rem; }
    .back-link:hover { color: var(--primary); }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      padding: 0.9rem 1.8rem; border-radius: 50px; box-shadow: var(--shadow-lg);
      z-index: 9999; font-weight: 500; display: none;
      align-items: center; gap: 0.5rem; max-width: 90vw;
    }
    .toast-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .toast-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    @keyframes slideUp {
      from { opacity:0; transform: translateX(-50%) translateY(20px); }
      to { opacity:1; transform: translateX(-50%) translateY(0); }
    }
    @media (max-width: 480px) { .login-card { padding: 2rem 1.5rem; } }
  </style>
</head>
<body>
  <div class="bg-decoration"></div>
  <div class="bg-decoration bg-decoration-2"></div>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> الرئيسية</a>
  <div class="top-controls">
    <button class="ctrl-btn" id="langToggle" title="English"><i class="fas fa-globe"></i></button>
    <button class="ctrl-btn" id="darkToggle" title="الوضع الليلي"><i class="fas fa-moon"></i></button>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <a href="index.html" class="logo-link"><i class="fas fa-chalkboard-teacher"></i> Zentor</a>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">تسجيل دخول المعلمين</p>
      </div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="teacher@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn" id="loginBtn">
          <span class="btn-text"><i class="fas fa-sign-in-alt"></i> دخول</span>
          <span class="spinner"></span>
        </button>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
      authDomain: "zentor-caaf1.firebaseapp.com",
      projectId: "zentor-caaf1",
      storageBucket: "zentor-caaf1.firebasestorage.app",
      messagingSenderId: "681267238383",
      appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
      measurementId: "G-X80GNJHMS5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const html = document.documentElement;
    const darkToggle = document.getElementById('darkToggle');
    const langToggle = document.getElementById('langToggle');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const toast = document.getElementById('toast');

    function showToast(msg, type='error') {
      toast.textContent = msg;
      toast.className = `toast toast-${type}`;
      toast.style.display = 'flex';
      clearTimeout(window._t);
      window._t = setTimeout(() => toast.style.display = 'none', 4000);
    }

    function setDark(on) {
      html.classList.toggle('dark', on);
      darkToggle.innerHTML = on ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      darkToggle.title = on ? 'الوضع الفاتح' : 'الوضع الليلي';
    }
    darkToggle.addEventListener('click', ()=> setDark(!html.classList.contains('dark')));
    setDark(localStorage.getItem('zentor_teacher_dark_mode') === 'true');

    function setLang(lang) {
      html.dir = lang === 'ar' ? 'rtl' : 'ltr';
      html.lang = lang;
      langToggle.title = lang === 'ar' ? 'English' : 'العربية';
      document.querySelector('.back-link').innerHTML = lang === 'ar' ? '<i class="fas fa-arrow-right"></i> الرئيسية' : '<i class="fas fa-arrow-left"></i> Home';
      document.querySelector('.logo-link').innerHTML = lang === 'ar' ? '<i class="fas fa-chalkboard-teacher"></i> Zentor' : '<i class="fas fa-chalkboard-teacher"></i> Zentor';
      document.querySelector('.login-header p').textContent = lang === 'ar' ? 'تسجيل دخول المعلمين' : 'Teacher Login';
      document.querySelector('label[for="email"]').textContent = lang === 'ar' ? 'البريد الإلكتروني' : 'Email';
      document.querySelector('label[for="password"]').textContent = lang === 'ar' ? 'كلمة المرور' : 'Password';
      loginBtn.querySelector('.btn-text').innerHTML = lang === 'ar' ? '<i class="fas fa-sign-in-alt"></i> دخول' : '<i class="fas fa-sign-in-alt"></i> Login';
      localStorage.setItem('zentor_teacher_lang', lang);
    }
    langToggle.addEventListener('click', ()=> setLang(html.lang === 'ar' ? 'en' : 'ar'));
    setLang(localStorage.getItem('zentor_teacher_lang') || 'ar');

    function setLoading(loading) {
      if (loading) { loginBtn.classList.add('loading'); loginBtn.disabled = true; }
      else { loginBtn.classList.remove('loading'); loginBtn.disabled = false; }
    }

    // إنشاء ملف التعريف تلقائياً إذا لم يكن موجوداً
    async function ensureTeacherProfile(uid, email) {
      const profileRef = doc(db, 'teachers', uid, 'settings', 'profile');
      const snap = await getDoc(profileRef);
      if (!snap.exists()) {
        const name = email.split('@')[0].replace(/[._-]/g, ' ');
        await setDoc(profileRef, {
          name: name,
          email: email,
          createdAt: serverTimestamp()
        });
        console.log('✅ تم إنشاء profile للمعلم:', uid);
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) {
        showToast(html.lang === 'ar' ? 'يرجى ملء جميع الحقول' : 'Please fill all fields');
        return;
      }
      setLoading(true);
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        // تأكد من وجود profile
        await ensureTeacherProfile(user.uid, user.email);
        showToast(html.lang === 'ar' ? 'تم تسجيل الدخول بنجاح' : 'Logged in successfully', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (error) {
        let msg = error.message;
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          msg = html.lang === 'ar' ? 'بريد إلكتروني أو كلمة مرور غير صحيحة' : 'Invalid email or password';
        } else if (error.code === 'auth/invalid-email') {
          msg = html.lang === 'ar' ? 'بريد إلكتروني غير صالح' : 'Invalid email';
        }
        showToast(msg);
      } finally {
        setLoading(false);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await ensureTeacherProfile(user.uid, user.email);
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
